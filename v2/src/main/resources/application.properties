# ============================================================
# SERVER
# ============================================================
# Same port as V1 so the loadtest works unchanged
server.port=8000

# JSON output: use snake_case to match V1's Python output
# (show_id instead of showId, date_added instead of dateAdded)
spring.jackson.property-naming-strategy=SNAKE_CASE

# ============================================================
# DATABASE (MySQL) — same credentials as V1's db.py
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/database_netflix
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# HIKARICP CONNECTION POOL
# ============================================================
# V1 had pool_size=5. That was the #1 bottleneck.
# HikariCP is the fastest Java connection pool — comes free with Spring Boot.
#
# maximum-pool-size: max simultaneous DB connections.
#   20 handles our 100 VUs well because each HTTP thread only holds
#   a connection for the duration of one query (milliseconds),
#   then returns it. 20 connections can serve 200 threads easily.
#
# minimum-idle: keep 10 connections warm so there's no cold-start penalty.
#
# connection-timeout: how long a thread waits for a free connection
#   before giving up. 5s is generous — if we hit this, pool is too small.
#
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ============================================================
# TOMCAT THREAD POOL
# ============================================================
# Embedded Tomcat defaults to 200 threads — already way better than
# Flask's single-threaded dev server. No change needed, but making
# it explicit so we can explain it.
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
