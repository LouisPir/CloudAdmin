# ============================================================
# SERVER
# ============================================================
server.port=8000

# JSON output: snake_case to match V1's Python output
spring.jackson.property-naming-strategy=SNAKE_CASE

# ============================================================
# DATABASE (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/database_netflix
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# HIKARICP CONNECTION POOL
# ============================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ============================================================
# TOMCAT THREAD POOL
# ============================================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20

# ============================================================
# REDIS CACHE (V3 addition)
# ============================================================
# We cache the 4 aggregation endpoints because:
#   - They do GROUP BY across the full table (expensive)
#   - Results are identical for every user (no parameters that vary)
#   - Under 100 VUs, caching means 1 MySQL query per 60s instead of hundreds
#
# TTL = 60 seconds. Trade-off: results can be up to 60s stale.
# Acceptable because the Netflix catalog doesn't change during a load test.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# Our CacheService reads this value
app.cache.ttl-seconds=60
